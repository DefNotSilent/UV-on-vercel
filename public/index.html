<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse Console</title>
    
    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>

    <style>
        :root {
            --bg: #1a1c24;
            --panel: #222531;
            --accent-gradient: linear-gradient(135deg, #8155ff 0%, #5633ff 100%);
            --text-primary: #ffffff;
            --text-secondary: #9499b0;
            --shadow: 10px 10px 20px #15171d, -5px -5px 15px rgba(255,255,255,0.02);
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-primary);
            overflow: hidden;
        }

        .glass-card {
            width: 400px;
            background-color: var(--panel);
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .header-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        h2 { font-weight: 600; font-size: 1.8rem; margin: 0 0 10px 0; }
        p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 30px; }

        .input-box {
            background-color: #1a1c24;
            border: none;
            border-radius: 16px;
            padding: 18px;
            width: 100%;
            box-sizing: border-box;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            box-shadow: inset 4px 4px 8px #111319, inset -2px -2px 6px rgba(255,255,255,0.01);
            outline: none;
            transition: 0.3s;
        }

        .input-box:focus { box-shadow: 0 0 0 2px #8155ff; }

        .launch-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(129, 85, 255, 0.3);
            transition: 0.2s;
        }

        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(129, 85, 255, 0.4);
        }

        .hint {
            margin-top: 25px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="header-icons">
            <span>⌂</span> <span>🔍</span> <span>💬</span> <span>⚙</span>
        </div>

        <h2>Secure Entry</h2>
        <p>Initialize encrypted proxy session</p>
        
        <input type="text" id="urlInput" class="input-box" placeholder="Search or enter URL..." autofocus>
        
        <button class="launch-btn" onclick="launch()">Launch Session</button>
        
        <div class="hint">Enter to Launch • Esc to Panic</div>
    </div>

    <script>
        const input = document.getElementById('urlInput');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') launch();
        });

        async function launch() {
            let url = input.value.trim();
            if (!url) return;

            // Search logic (Google if not a URL)
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            // 1. Register UV Service Worker
            try {
                await navigator.serviceWorker.register('/uv-sw.js', {
                    scope: __uv$config.prefix
                });
            } catch (err) {
                alert("Proxy error: Make sure UV files are on the server.");
                return;
            }

            // 2. Encode URL
            const encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);

            // 3. Open Cloaked Tab
            const win = window.open('about:blank', '_blank');
            if (!win) return alert("Pop-ups blocked!");

            // Tab Identity (Google Search Spoof)
            win.document.title = "when is silent central v3 released? - Google Search";
            const fav = win.document.createElement('link');
            fav.rel = 'icon'; fav.href = 'https://www.google.com/favicon.ico';
            win.document.head.appendChild(fav);

            // Fullscreen Iframe
            const iframe = win.document.createElement('iframe');
            Object.assign(iframe.style, {
                position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
                border: 'none', margin: '0', padding: '0', overflow: 'hidden'
            });

            iframe.src = encodedUrl;
            win.document.body.appendChild(iframe);

            // Panic Key
            win.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') win.close();
            });
        }
    </script>
</body>
</html>
