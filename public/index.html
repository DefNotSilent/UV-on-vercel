<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse Console</title>
    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>
    <style>
        :root {
            --bg: #1a1c24;
            --panel: #222531;
            --accent: #8155ff;
            --text: #ffffff;
            --sec: #9499b0;
        }

        body {
            margin: 0; height: 100vh; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-family: sans-serif; color: var(--text);
        }

        .card {
            width: 380px; background: var(--panel); padding: 40px;
            border-radius: 24px; text-align: center;
            box-shadow: 15px 15px 30px #12141a;
        }

        input {
            width: 100%; padding: 15px; margin: 20px 0;
            border-radius: 12px; border: none; background: #1a1c24;
            color: white; outline: none; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; border-radius: 12px;
            border: none; background: linear-gradient(135deg, #8155ff, #5633ff);
            color: white; font-weight: bold; cursor: pointer;
        }

        .hint { font-size: 0.7rem; color: var(--sec); margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Eclipse</h2>
        <p>Proxy Entry Point</p>
        
        <input type="text" id="urlInput" placeholder="Search or URL..." autofocus>
        <button id="searchButton">Launch Session</button>
        
        <div class="hint">ESC to Panic • ENTER to Launch</div>
    </div>

    <script>
        const input = document.getElementById("urlInput");
        const btn = document.getElementById("searchButton");

        // 1. YOUR LOGIC: Handle Enter Key
        input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                btn.click();
            }
        });

        // 2. YOUR LOGIC: Process URL & Launch
        btn.onclick = async function (event) {
            event.preventDefault();
            let url = input.value.trim();
            let searchUrl = "https://www.google.com/search?q=";

            if (!url) return;

            // Logic to check for URL vs Search
            if (!url.includes(".")) {
                url = searchUrl + encodeURIComponent(url);
            } else {
                if (!url.startsWith("http://") && !url.startsWith("https://")) {
                    url = "https://" + url;
                }
            }

            // --- UV Proxy Integration ---
            // Register the Service Worker
            try {
                await navigator.serviceWorker.register('/uv/uv.sw.js', {
                    scope: __uv$config.prefix
                });
            } catch (e) {
                console.error("UV registration failed. Check your files.");
            }

            // Encode the URL for stealth
            const proxiedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);

            // Open Cloaked Tab
            const win = window.open('about:blank', '_blank');
            if (!win) return alert("Allow pop-ups!");

            // Tab Identity Spoof
            win.document.title = "Math Help - Google Search";
            const icon = win.document.createElement('link');
            icon.rel = 'icon'; icon.href = 'https://google.com/favicon.ico';
            win.document.head.appendChild(icon);

            // Full-screen Iframe
            const iframe = win.document.createElement('iframe');
            Object.assign(iframe.style, {
                position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
                border: 'none', margin: '0', padding: '0'
            });

            iframe.src = proxiedUrl;
            win.document.body.appendChild(iframe);

            // Panic Key
            win.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') win.close();
            });
        };
    </script>
</body>
</html>
